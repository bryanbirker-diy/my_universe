<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#f5f0e8"/>
  <!-- Clock face watermark -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#c39169" stroke-width="6" opacity="0.2"/>
  <!-- Hour ticks -->
  <line x1="256" y1="62" x2="256" y2="86" stroke="#c39169" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  <line x1="450" y1="256" x2="426" y2="256" stroke="#c39169" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  <line x1="256" y1="450" x2="256" y2="426" stroke="#c39169" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  <line x1="62" y1="256" x2="86" y2="256" stroke="#c39169" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
  <!-- Hour hand -->
  <line x1="256" y1="256" x2="200" y2="170" stroke="#8a6f4e" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  <!-- Minute hand -->
  <line x1="256" y1="256" x2="310" y2="158" stroke="#8a6f4e" stroke-width="7" stroke-linecap="round" opacity="0.4"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="10" fill="#8a6f4e" opacity="0.5"/>
  <!-- "ours" wordmark -->
  <text x="256" y="300" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="300"
    font-size="120"
    fill="#c39169"
    letter-spacing="-3"
  >ours</text>
</svg>
