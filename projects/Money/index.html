<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Our Money — ours</title>
  <link rel="manifest" href="../../manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Caveat:wght@500;700&family=Kalam:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../Pantry/wireframe-base.css" />
  <style>
    html, body { margin: 0; min-height: 100%; background: var(--paper-2); }
    body { font-family: "Kalam", system-ui, sans-serif; color: var(--ink); }
    * { box-sizing: border-box; }

    .text-input {
      border: 1.5px solid var(--rule);
      border-radius: 5px 7px 4px 6px;
      padding: 7px 10px;
      font-family: var(--pen);
      font-size: 14px;
      color: var(--ink);
      background: rgba(255,255,255,0.55);
      outline: none;
      width: 100%;
    }
    .text-input:focus { border-color: #b5892e; }

    .notes-textarea {
      width: 100%;
      border: 1.5px solid var(--rule);
      border-radius: 5px 7px 4px 6px;
      padding: 10px;
      font-family: var(--pen); font-size: 13px;
      color: var(--ink);
      background: rgba(255,255,255,0.55);
      resize: vertical; outline: none; line-height: 1.7;
    }
    .notes-textarea:focus { border-color: #b5892e; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../../firebase-config.js"></script>

<script type="text/babel" src="../../firebase-auth.jsx"></script>

<script src="store.js"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
