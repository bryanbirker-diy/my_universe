<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Our Pantry — Meal Planner</title>
  <link rel="manifest" href="../../manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Kalam:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="wireframe-base.css" />
  <style>
    html, body {
      margin: 0; min-height: 100%; background: var(--paper-2);
      overflow-x: hidden; /* prevent horizontal overflow on iOS */
    }
    body { font-family: "Kalam", system-ui, sans-serif; color: var(--ink); }
    * { box-sizing: border-box; }

    /* ── Top bar ─────────────────────────────────────────────── */
    .app-topbar {
      position: sticky; top: 0; z-index: 50;
      background: var(--paper);
      border-bottom: 1.5px solid var(--rule);
      display: flex; align-items: center;
      gap: 12px;
      /* safe-area-inset-top for notch/Dynamic Island */
      padding: 10px 18px;
      padding-top: max(10px, env(safe-area-inset-top));
    }

    /* ── Bottom nav — pill buttons ───────────────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: var(--paper);
      border-top: 1.5px solid var(--rule);
      display: flex; justify-content: center; gap: 6px;
      padding: 8px 12px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
    }
    .bottom-tab {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 13px;
      border: 1.5px solid var(--rule-soft);
      border-radius: 20px 22px 18px 21px / 19px 21px 20px 18px;
      background: rgba(255,255,255,0.55);
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--ink-soft);
      cursor: pointer; transition: all .12s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      box-shadow: 1px 1.5px 0 rgba(43,38,32,0.1);
    }
    .tab-icon { font-size: 14px; line-height: 1; }
    .bottom-tab.active {
      background: var(--brown);
      border-color: #4a3a25;
      color: #fdf9f0;
      box-shadow: 1.5px 2.5px 0 rgba(43,38,32,0.28);
    }

    /* ── Page layout ─────────────────────────────────────────── */
    .page {
      max-width: 860px; margin: 0 auto;
      padding: 28px 18px;
      /* enough room for pill nav + home indicator */
      padding-bottom: max(110px, calc(80px + env(safe-area-inset-bottom)));
    }

    /* ── Modal ───────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(24,20,16,.48);
      backdrop-filter: blur(4px);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 0;
    }
    @media (min-width: 560px) {
      .modal-backdrop { align-items: center; padding: 20px; }
    }
    .modal-sheet {
      background: var(--paper);
      border-radius: 18px 18px 4px 4px;
      padding: 20px 18px;
      width: 100%;
      max-width: 500px;
      max-height: 92vh;
      overflow-y: auto;
    }
    @media (min-width: 560px) {
      .modal-sheet { border-radius: 12px; }
    }

    /* ── Calendar day rows ───────────────────────────────────── */
    .day-row {
      border: 1.5px solid var(--rule-soft);
      border-radius: 8px 10px 6px 9px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.45);
      overflow: hidden;
    }
    .day-header {
      padding: 6px 12px;
      border-bottom: 1.5px solid var(--rule-soft);
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.3);
    }
    .day-slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }
    .day-slot-cell {
      padding: 8px 10px;
      border-right: 1.5px solid var(--rule-soft);
      cursor: pointer;
      transition: background .1s;
      min-height: 60px;
    }
    .day-slot-cell:last-child { border-right: none; }
    .day-slot-cell:hover { background: rgba(0,0,0,0.03); }
    @media (max-width: 480px) {
      .day-slots { grid-template-columns: 1fr; }
      .day-slot-cell { border-right: none; border-bottom: 1.5px solid var(--rule-soft); }
      .day-slot-cell:last-child { border-bottom: none; }
    }

    /* ── Recipe cards ────────────────────────────────────────── */
    .recipe-card {
      border: 1.5px solid var(--rule-soft);
      border-radius: 8px 10px 6px 9px;
      padding: 14px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.55);
    }

    /* ── Grocery items ───────────────────────────────────────── */
    .grocery-item {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 9px 6px;
      border-bottom: 1px dotted var(--rule-soft);
      cursor: pointer;
      border-radius: 4px;
      transition: background .1s;
    }
    .grocery-item:last-child { border-bottom: none; }
    .grocery-item:hover { background: rgba(0,0,0,0.025); }

    /* ── Step indicator ──────────────────────────────────────── */
    .step-dot {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1.5px solid var(--rule);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 11px;
      color: var(--ink-fade); flex-shrink: 0;
    }
    .step-dot.active { background: var(--brown); border-color: var(--brown); color: #fdf9f0; }
    .step-dot.done   { background: var(--olive); border-color: var(--olive); color: #f7f5e6; }
    .step-line { flex: 1; height: 1.5px; background: var(--rule-soft); }

    /* ── Form inputs ─────────────────────────────────────────── */
    .text-input {
      border: 1.5px solid var(--rule);
      border-radius: 5px 7px 4px 6px;
      padding: 7px 10px;
      font-family: var(--pen);
      font-size: 14px;
      color: var(--ink);
      background: rgba(255,255,255,0.55);
      outline: none;
      width: 100%;
    }
    .text-input:focus { border-color: var(--brown); }
    input[type="date"].text-input { font-family: var(--mono); }

    .ingredient-textarea {
      width: 100%; min-height: 150px;
      border: 1.5px solid var(--rule);
      border-radius: 5px 7px 4px 6px;
      padding: 10px;
      font-family: var(--mono); font-size: 13px;
      color: var(--ink);
      background: rgba(255,255,255,0.55);
      resize: vertical; outline: none;
      line-height: 1.7;
    }
    .ingredient-textarea:focus { border-color: var(--brown); }

    /* ── Empty states ────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--ink-soft);
    }

    /* ── Error text ──────────────────────────────────────────── */
    .field-error {
      color: var(--terracotta);
      font-family: var(--mono);
      font-size: 11px;
      margin-top: 4px;
    }

    /* ── Slot cell content ───────────────────────────────────── */
    .slot-name { font-size: 13px; line-height: 1.2; margin-top: 3px; }
    .slot-sides { font-size: 10px; color: var(--ink-soft); font-family: var(--mono); margin-top: 2px; }
    .slot-add { color: var(--ink-fade); font-style: italic; font-size: 12px; margin-top: 3px; }
    .slot-warning { color: var(--terracotta); font-size: 11px; font-family: var(--mono); margin-top: 3px; }

    /* ── Dessert slot row ────────────────────────────────────── */
    .day-slot-dessert {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 12px;
      border-top: 1px dotted var(--rule-soft);
      cursor: pointer;
      background: rgba(255,255,255,0.15);
      transition: background .1s;
      min-height: 30px;
    }
    .day-slot-dessert:hover { background: rgba(195,145,105,0.08); }
    .day-slot-dessert.filled { background: rgba(195,145,105,0.12); }

    /* ── Pantry sections ─────────────────────────────────────── */
    .pantry-section {
      border: 1.5px solid var(--rule-soft);
      border-radius: 8px 10px 6px 9px;
      margin-bottom: 14px;
      background: rgba(255,255,255,0.45);
      overflow: hidden;
    }
    .pantry-section-header {
      padding: 10px 14px;
      border-bottom: 1.5px solid var(--rule-soft);
      background: rgba(255,255,255,0.3);
      display: flex; justify-content: space-between; align-items: center;
    }
    .pantry-item {
      display: flex; gap: 8px; align-items: center;
      padding: 8px 14px;
      border-bottom: 1px dotted var(--rule-soft);
    }
    .pantry-item:last-child { border-bottom: none; }
    .pantry-item:hover { background: rgba(0,0,0,0.02); }
  </style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Firebase compat SDK -->

<script type="text/babel" src="../../firebase-auth.jsx"></script>

<script src="store.js"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
